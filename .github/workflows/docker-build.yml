name: Frontend – Build & Push Docker

on:
  push:
    branches: [deploy]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            JOAKOO123/muni-valle-sol-frontend:latest
            JOAKOO123/muni-valle-sol-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_BFF_URL=${{ secrets.NEXT_PUBLIC_BFF_URL }}
